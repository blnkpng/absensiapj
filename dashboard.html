<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Dashboard</title>

<style>

body{
font-family:-apple-system,sans-serif;
background:#f5f5f7;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
margin:0;
}

.card{
background:white;
padding:30px;
border-radius:24px;
width:90%;
max-width:400px;
text-align:center;
box-shadow:0 10px 30px rgba(0,0,0,.08);
}

h2{
margin-bottom:10px;
}

button{
width:100%;
height:55px;
border:none;
border-radius:16px;
background:#111;
color:white;
font-size:15px;
margin-top:12px;
cursor:pointer;
}

</style>
</head>
<body>

<div class="card">

<h2 id="nama">
Memuat...
</h2>

<p>Karyawan Ampera Pak Jenggot</p>

<button>
ABSEN MASUK
</button>

<button>
ABSEN PULANG
</button>

<button onclick="logout()">
LOGOUT
</button>

</div>

<script>

const user =
JSON.parse(
localStorage.getItem("user")
);

if(!user){

window.location.href =
"index.html";

}

document.getElementById("nama")
.innerHTML =
"Halo, " + user.nama;

function logout(){

localStorage.removeItem("user");

window.location.href =
"index.html";

}

</script>

</body>
</html>
