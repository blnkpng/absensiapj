<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Ampera Pak Jenggot</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","Segoe UI",sans-serif;
}

:root{
--bg:#f5f5f7;
--card:#ffffff;
--text:#111111;
--sub:#777777;
--input:#f2f2f7;
--shadow:0 20px 60px rgba(0,0,0,.08);
}

body{
background:#f5f5f7;
background-image:
radial-gradient(circle at top left,#ffffff 0%,transparent 35%),
radial-gradient(circle at bottom right,#ececec 0%,transparent 35%);
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
padding:20px;
}

.container{
width:100%;
max-width:450px;
background:#ffffff;
border-radius:32px;
padding:40px 30px;
box-shadow:var(--shadow);
}

.logo{
text-align:center;
margin-bottom:35px;
}

.logo-img{
width:110px;
height:110px;
object-fit:contain;
display:block;
margin:0 auto 18px;
}

.logo h1{
font-size:30px;
font-weight:700;
color:#111;
letter-spacing:-1px;
line-height:1.1;
}

.logo p{
margin-top:8px;
font-size:14px;
color:#777;
}

.tabs{
display:flex;
background:#f2f2f7;
padding:4px;
border-radius:16px;
margin-bottom:25px;
}

.tabs button{
flex:1;
padding:13px;
border:none;
background:none;
cursor:pointer;
font-size:15px;
font-weight:600;
border-radius:12px;
transition:.25s;
}

.tabs button.active{
background:white;
box-shadow:0 2px 10px rgba(0,0,0,.08);
}

.form{
display:flex;
flex-direction:column;
gap:14px;
animation:fade .25s ease;
}

@keyframes fade{
from{
opacity:0;
transform:translateY(8px);
}
to{
opacity:1;
transform:translateY(0);
}
}

input{
width:100%;
height:56px;
border:none;
background:#f2f2f7;
border-radius:16px;
padding:0 18px;
font-size:15px;
transition:.2s;
}

input:focus{
outline:none;
background:#ececf1;
}

.password-wrapper{
position:relative;
}

.password-wrapper button{
position:absolute;
right:15px;
top:50%;
transform:translateY(-50%);
border:none;
background:none;
cursor:pointer;
font-size:18px;
}

.btn{
height:58px;
border:none;
border-radius:18px;
background:#111;
color:white;
font-size:15px;
font-weight:600;
cursor:pointer;
transition:.25s;
}

.btn:hover{
transform:translateY(-1px);
box-shadow:0 10px 25px rgba(0,0,0,.15);
}

.btn:active{
transform:translateY(0);
}

#registerForm{
display:none;
}

.footer{
margin-top:25px;
text-align:center;
font-size:12px;
color:#999;
}

@media (max-width:480px){

body{
padding:15px;
}

.container{
padding:28px 22px;
border-radius:24px;
}

.logo-img{
width:75px;
height:75px;
}

.logo h1{
font-size:24px;
}

input{
height:52px;
font-size:14px;
}

.btn{
height:54px;
}

}

@media (min-width:768px){

.container{
max-width:520px;
padding:45px;
}

.logo h1{
font-size:34px;
}

}

</style>
</head>

<body>

<div class="container">

<div class="logo">

<img
src="https://i.imgur.com/57jze1n.png"
alt="Logo Ampera Pak Jenggot"
class="logo-img">

<h2>Ampera Pak Jenggot</h2>
<p>Absensi Karyawan Online</p>

</div>

<div class="tabs">

<button
id="loginTab"
class="active">
Login
</button>

<button
id="registerTab">
Daftar
</button>

</div>

<!-- LOGIN -->

<div id="loginForm">

<div class="form">

<input
id="loginUsername"
type="text"
placeholder="Username">

<div class="password-wrapper">

<input
id="loginPassword"
type="password"
placeholder="Password">

<button
type="button"
onclick="togglePassword('loginPassword')">
👁
</button>

</div>

<button
class="btn"
onclick="loginUser()">
Masuk
</button>

</div>

</div>

<!-- REGISTER -->
<div id="registerForm">

<div class="form">

<input
id="regNama"
type="text"
placeholder="Nama Lengkap">

<input
id="regUsername"
type="text"
placeholder="Username">

<div class="password-wrapper">

<input
id="registerPassword"
type="password"
placeholder="Password">

<button
type="button"
onclick="togglePassword('registerPassword')">
👁
</button>

</div>

<div class="password-wrapper">

<input
id="confirmPassword"
type="password"
placeholder="Konfirmasi Password">

<button
type="button"
onclick="togglePassword('confirmPassword')">
👁
</button>

</div>

<button
class="btn"
onclick="registerUser()">
Daftar
</button>

</div>

</div>

<div class="footer">
Ampera Pak Jenggot © 2026
</div>

</div>

<script>

const loginTab =
document.getElementById("loginTab");

const registerTab =
document.getElementById("registerTab");

const loginForm =
document.getElementById("loginForm");

const registerForm =
document.getElementById("registerForm");

loginTab.onclick = () => {

loginTab.classList.add("active");
registerTab.classList.remove("active");

loginForm.style.display = "block";
registerForm.style.display = "none";

};

registerTab.onclick = () => {

registerTab.classList.add("active");
loginTab.classList.remove("active");

registerForm.style.display = "block";
loginForm.style.display = "none";

};

function togglePassword(id){

const field =
document.getElementById(id);

field.type =
field.type === "password"
? "text"
: "password";

}
const API_URL =
"https://script.google.com/macros/s/AKfycbz-gFRo9DJFtPesBHXaKIZluE9vN9eUvLsHiIEHmkd4MFaitTgTyWacxyRMbyoDWKYm/exec";

async function registerUser(){

const nama =
document.getElementById("regNama").value;

const username =
document.getElementById("regUsername").value;

const password =
document.getElementById("registerPassword").value;

const confirm =
document.getElementById("confirmPassword").value;

if(
!nama ||
!username ||
!password
){
alert("Lengkapi data");
return;
}

if(password !== confirm){
alert("Konfirmasi password tidak cocok");
return;
}

try{

const response =
await fetch(API_URL,{

method:"POST",

body:JSON.stringify({

action:"register",
nama:nama,
username:username,
password:password

})

});

const hasil =
await response.json();

alert(hasil.pesan);

}catch(err){

alert("Gagal koneksi ke server");

}

}

async function loginUser(){

const username =
document.getElementById("loginUsername").value;

const password =
document.getElementById("loginPassword").value;

if(
!username ||
!password
){
alert("Lengkapi data login");
return;
}

try{

const response =
await fetch(API_URL,{

method:"POST",

body:JSON.stringify({

action:"login",
username:username,
password:password

})

});

const hasil =
await response.json();

if(hasil.sukses){

localStorage.setItem(
"user",
JSON.stringify(hasil)
);

alert(
"Selamat datang " +
hasil.nama
);

}else{

alert(hasil.pesan);

}

}catch(err){

alert("Gagal koneksi ke server");

}

}
</script>

</body>
</html>
