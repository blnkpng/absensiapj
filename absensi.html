<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Absensi Karyawan</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","Segoe UI",sans-serif;
}

body{
background:#f5f5f7;
display:flex;
justify-content:center;
padding:20px;
min-height:100vh;
}

.container{
width:100%;
max-width:500px;
background:white;
border-radius:32px;
padding:30px;
box-shadow:0 20px 60px rgba(0,0,0,.08);
}

.logo{
text-align:center;
margin-bottom:20px;
}

.logo img{
width:90px;
height:90px;
object-fit:contain;
}

.logo h2{
margin-top:10px;
color:#111;
}

.subtitle{
text-align:center;
color:#666;
margin-bottom:25px;
}

.camera-box{
height:220px;
background:#f2f2f7;
border-radius:20px;
display:flex;
align-items:center;
justify-content:center;
color:#999;
margin-top:15px;
margin-bottom:20px;
}

.btn-group{
display:flex;
gap:12px;
flex-wrap:wrap;
}

.btn{
flex:1;
height:55px;
border:none;
border-radius:16px;
background:#111;
color:white;
font-size:15px;
font-weight:600;
cursor:pointer;
}

.btn:hover{
opacity:.9;
}

.section-title{
font-size:16px;
font-weight:600;
margin:20px 0 12px;
text-align:center;
color:#111;
}
.lokasi-box{
background:#f2f2f7;
padding:18px;
border-radius:18px;
margin-bottom:20px;
text-align:center;
}

#statusLokasi{
font-size:14px;
color:#444;
line-height:1.6;
}
  
table{
width:100%;
border-collapse:collapse;
font-size:14px;
}

th{
background:#f2f2f7;
padding:12px;
}

td{
padding:12px;
border-bottom:1px solid #eee;
text-align:center;
}

.logout{
margin-top:20px;
width:100%;
height:50px;
border:none;
background:#e53935;
color:white;
border-radius:16px;
cursor:pointer;
font-size:15px;
font-weight:700;
letter-spacing:.2px;
}

.status-badge{
display:none;
padding:14px 20px;
border-radius:16px;
font-size:15px;
font-weight:700;
color:white !important;
text-align:center;
margin:0 auto 40px auto;

width:100%;
max-width:320px;

box-shadow:0 8px 24px rgba(0,0,0,.12);
}

@media(max-width:480px){

.status-badge{

max-width:100%;
font-size:14px;
padding:14px 16px;

}

}
  
</style>
</head>
<body>

<div class="container">

<div class="logo">

<img
src="https://i.imgur.com/57jze1n.png">

<h2 id="namaUser">
Memuat...
</h2>

</div>

<div class="subtitle">
Silahkan lakukan absensi
</div>
  
<div
id="statusLokasi"
class="status-badge">
</div>
  
<div class="camera-box">
Kamera akan ditambahkan
</div>

<div class="btn-group">

<button
class="btn">
Check In
</button>

<button
class="btn">
Check Out
</button>

</div>

<div class="section-title">
Riwayat Absensi Hari Ini
</div>

<table>

<tr>
<th>Tanggal</th>
<th>Masuk</th>
<th>Pulang</th>
</tr>

<tr>
<td>-</td>
<td>-</td>
<td>-</td>
</tr>

</table>

<button
class="logout"
onclick="logout()">
Logout
</button>

</div>

<script>

const user =
JSON.parse(
localStorage.getItem("user")
);

const outlets = [

{
nama:"Lahor",
lat:-7.868505342051650,
lng:112.51903200122700
},

{
nama:"Senisono",
lat:-7.873045159816740,
lng:112.52751812337700
},

{
nama:"Pujon",
lat:-7.842424279801180,
lng:112.46738165616400
},

{
nama:"Ngujung",
lat:-7.864311319138000,
lng:112.55107532480400
},

{
nama:"Pokopek",
lat:-7.892148877707100,
lng:112.54136652674100
}

];
  
if(!user){

window.location.href =
"index.html";

}

document.getElementById(
"namaUser"
).innerHTML =
"Selamat Datang,<br>" +
user.nama;

ambilLokasi();
  
function logout(){

localStorage.removeItem("user");

window.location.href =
"index.html";

}
  
  function hitungJarak(
lat1,
lon1,
lat2,
lon2
){

const R = 6371000;

const dLat =
(lat2-lat1) *
Math.PI/180;

const dLon =
(lon2-lon1) *
Math.PI/180;

const a =

Math.sin(dLat/2) *
Math.sin(dLat/2)

+

Math.cos(
lat1*Math.PI/180
)

*

Math.cos(
lat2*Math.PI/180
)

*

Math.sin(dLon/2)
*
Math.sin(dLon/2);

const c =

2 *
Math.atan2(
Math.sqrt(a),
Math.sqrt(1-a)
);

return R*c;

}
  
function ambilLokasi(){

const status =
document.getElementById(
"statusLokasi"
);

if(!navigator.geolocation){

status.innerHTML =
"GPS tidak didukung browser";

return;

}

navigator.geolocation.getCurrentPosition(

function(pos){

const lat =
pos.coords.latitude;

const lng =
pos.coords.longitude;

let outletDekat = null;
let jarakTerdekat = Infinity;

for(const outlet of outlets){

const jarak =
hitungJarak(
lat,
lng,
outlet.lat,
outlet.lng
);

if(jarak < jarakTerdekat){

jarakTerdekat = jarak;
outletDekat = outlet;

}

}

if(jarakTerdekat <= 100){

status.style.display = "block";

status.innerHTML =
"Status : Siap Absen";

status.style.background =
"linear-gradient(135deg,#22c55e,#16a34a)";

status.style.color =
"#ffffff";

}else{

status.style.display = "block";

status.innerHTML =
"Status : Diluar Radius Outlet";

status.style.background =
"linear-gradient(135deg,#ef4444,#dc2626)";

status.style.color =
"#ffffff";

}

},

function(error){

status.innerHTML =
"❌ Gagal mengambil lokasi";

}

);

}
</script>

</body>
</html>
